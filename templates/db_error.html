{% extends "base.html" %}
{% block title %}Database not available{% endblock %}
{% block content %}
<div class="panel center" style="max-width:560px;margin:40px auto;">
  <h1>⚠️ Database not reachable</h1>
  <p class="muted">
    The POS can't reach its database right now. This usually means the database
    service isn't running yet, or the saved credentials need updating.
  </p>
  <div style="margin:24px auto 0;display:flex;gap:10px;justify-content:center;">
    <button class="btn btn-primary" onclick="location.reload()">Try again</button>
    <a class="btn" href="{{ url_for('troubleshoot') }}">Troubleshoot</a>
  </div>
</div>
{% endblock %}
