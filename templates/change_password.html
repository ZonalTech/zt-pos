{% extends "base.html" %}
{% block title %}Change password{% endblock %}
{% block content %}
<div class="login-wrap">
  <section class="panel login-panel">
    <h1>Set a new password</h1>
    {% if current_user.must_change_password %}
    <p class="muted small">Set a new password before continuing.</p>
    {% endif %}
    <form method="post" action="{{ url_for('change_password') }}" autocomplete="off">
      <label>Current password</label>
      <input type="password" name="current_password" autofocus required>
      <label>New password</label>
      <input type="password" name="new_password" minlength="8" required>
      <label>Confirm new password</label>
      <input type="password" name="confirm_password" minlength="8" required>
      <button class="btn btn-primary btn-lg" type="submit" style="width:100%">Update password</button>
    </form>
  </section>
</div>
{% endblock %}
